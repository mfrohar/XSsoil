backend:
  name: git-gateway
  branch: main

media_folder: assets/blog
public_folder: /assets/blog

collections:
  - name: blog
    label: Blog Posts
    files:
      - name: posts
        label: All Blog Posts
        file: data/blog.json
        fields:
          - name: posts
            label: Posts
            label_singular: Post
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: Title,     name: title,     widget: string }
              - { label: Slug,      name: slug,      widget: string,   hint: "URL-friendly ID, e.g. 'new-soil-regulations-2026'. No spaces or special characters." }
              - { label: Date,      name: date,      widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: Excerpt,   name: excerpt,   widget: text,     hint: "Short summary shown on the blog listing page (1–2 sentences)." }
              - { label: Cover Image, name: image,   widget: image,   required: false, hint: "Optional. Upload a photo or leave blank." }
              - { label: Body,      name: body,      widget: markdown }
              - { label: Published, name: published, widget: boolean,  default: true,   hint: "Uncheck to save as a draft — it won't appear on the blog." }
